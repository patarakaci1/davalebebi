<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>homework 12</title>
    <link rel="stylesheet" href="style12.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css">
</head>
<body>
    <div class="box">
        <div class="ABC"><span><i class="fa-solid fa-star"></i>ABC Solutions</span></div>
        <div class="srf"><h1>SERVICE REQUEST FORM</h1></div>
  <!-- Customer Information -->
  <section>
    <div class="section-title">Customer Information:</div>
    <div class="form-grid">
      <label>Customer<br>Name:</label>
      <input type="text" />

      <label>Contact<br>Number:</label>
      <input type="text" />

      <label>Home<br>Address:</label>
      <input type="text" />

      <label>Email<br>Address:</label>
      <input type="text" />
    </div>
  </section>

  <!-- Service Request Details -->
  <section>
    <div class="section-title">Service Request Details:</div>

    <div class="row">
      <span class="label-sm">Requested:</span>
      <div class="radio-group">
        <label><input type="radio" name="request-type" value="repair" /> Repair</label>
        <label><input type="radio" name="request-type" value="maintenance" /> Maintenance</label>
        <label><input type="radio" name="request-type" value="installation" /> Installation</label>
        <label><input type="radio" name="request-type" value="other" /> Other</label>
      </div>
    </div>

    <div class="desc-row">
      <span class="desc-label">Description of Service<br>Requested:</span>
      <input type="text" />
    </div>

    <div class="date-row">
      <span class="date-label">Date and Time Requested:</span>
      <input type="date" />
    </div>

    <div class="row">
      <span class="label-sm">Urgency Level:</span>
      <div class="radio-group">
        <label><input type="radio" name="urgency" value="low" /> Low</label>
        <label><input type="radio" name="urgency" value="medium" /> Medium</label>
        <label><input type="radio" name="urgency" value="high" /> High</label>
        <label><input type="radio" name="urgency" value="emergency" /> Emergency</label>
      </div>
    </div>
  </section>

  <!-- Approval -->
  <section>
    <div class="section-title">Approval:</div>
    <div class="approval-grid">
      <div>
        <span class="col-label">Applicant Name:</span>
        <input type="text" />
      </div>
      <div>
        <span class="col-label">Request Submission Date:</span>
        <input type="date" />
      </div>
    </div>
  </section>

  <!-- Service Personnel -->
  <section>
    <div class="section-title">Service Personnel:</div>

    <div class="personnel-row">
      <span class="p-label">Completed By:</span>
      <input type="text" />
      <span class="date-label">Date:</span>
      <input type="date" />
    </div>

    <div class="personnel-row">
      <span class="p-label">Approved By:</span>
      <input type="text" />
      <span class="date-label">Date:</span>
      <input type="date" />
    </div>
  </section>

</div>
</body>
</html>
